<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 电影磁力链接管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .empty-magnet { color: #dc3545; }
        .movie-row:hover { background-color: #f8f9fa; }
        .dark .movie-row:hover { background-color: #374151; }
        .copy-btn { cursor: pointer; }
        .copy-btn:hover { color: #0d6efd; }
        .dark .copy-btn:hover { color: #60a5fa; }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-center flex-grow-1">🎬 电影磁力链接管理</h1>
            <button id="themeToggle" class="theme-toggle btn btn-outline-secondary" title="切换主题">
                🌙
            </button>
        </div>
        
        <form action="/search" method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="keyword" class="form-control" placeholder="搜索电影名..." value="{{ keyword }}">
                <button type="submit" class="btn btn-primary">搜索</button>
                <a href="/" class="btn btn-secondary">返回首页</a>
            </div>
        </form>

        <div class="alert alert-info mb-4">
            搜索 "<strong>{{ keyword }}</strong>" 找到 <strong>{{ movies|length }}</strong> 条结果
        </div>

        <div class="card">
            <div class="card-header">搜索结果 (点击磁力链接复制)</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>序号</th>
                            <th>页码</th>
                            <th>电影名</th>
                            <th>磁力链接</th>
                            <th>保存时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for movie in movies %}
                        <tr class="movie-row" data-id="{{ movie.id }}">
                            <td>{{ movie.id }}</td>
                            <td>{{ movie.page }}</td>
                            <td>{{ movie.name }}</td>
                            <td>
                                <span onclick="copyMagnet({{ movie.id }})" 
                                      class="copy-btn {% if movie.is_empty %}text-danger{% endif %}">
                                    {{ movie.magnet_display }}
                                </span>
                            </td>
                            <td>{{ movie.save_time }}</td>
                            <td>
                                <button class="btn btn-sm btn-warning edit-btn"
                                        data-id="{{ movie.id }}"
                                        data-page="{{ movie.page }}"
                                        data-name="{{ movie.name }}"
                                        data-magnet="{{ movie.magnet if movie.magnet else '' }}">编辑</button>
                                <button onclick="deleteMovie({{ movie.id }})" 
                                        class="btn btn-sm btn-danger">删除</button>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="6" class="text-center text-muted">未找到匹配的电影</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-5 text-center text-muted">
            <p>版本号: {{ version }}</p>
        </footer>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑电影</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">页码</label>
                            <input type="number" id="editPage" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">电影名</label>
                            <input type="text" id="editName" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">磁力链接</label>
                            <input type="text" id="editMagnet" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updateMovie()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>
    <script>
        function showToast(message, type = 'success') {
            const bgClass = type === 'success' ? 'bg-success' : type === 'danger' ? 'bg-danger' : 'bg-info';
            const toastEl = document.createElement('div');
            toastEl.className = `toast align-items-center text-white ${bgClass} border-0`;
            toastEl.setAttribute('role', 'alert');
            toastEl.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            document.getElementById('toastContainer').appendChild(toastEl);
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-bs-theme', savedTheme);
        updateThemeIcon(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
            
            if (newTheme === 'dark') {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        });
        
        function updateThemeIcon(theme) {
            themeToggle.innerHTML = theme === 'light' ? '🌙' : '☀️';
        }

        async function deleteMovie(id) {
            if (confirm('确定要删除这部电影吗？')) {
                showLoading();
                const response = await fetch(`/delete/${id}`, { method: 'POST' });
                hideLoading();
                const result = await response.json();
                showToast(result.message, result.success ? 'success' : 'danger');
                if (result.success) {
                    location.reload();
                }
            }
        }

        function showEditModal(id, page, name, magnet) {
            document.getElementById('editId').value = id;
            document.getElementById('editPage').value = page;
            document.getElementById('editName').value = name;
            document.getElementById('editMagnet').value = magnet;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        document.querySelector('tbody').addEventListener('click', (e) => {
            const btn = e.target.closest('.edit-btn');
            if (btn) {
                const { id, page, name, magnet } = btn.dataset;
                showEditModal(id, page, name, magnet);
            }
        });

        async function updateMovie() {
            const id = document.getElementById('editId').value;
            const page = document.getElementById('editPage').value;
            const name = document.getElementById('editName').value;
            const magnet = document.getElementById('editMagnet').value;
            
            showLoading();
            
            const response = await fetch(`/update/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `page=${page}&name=${encodeURIComponent(name)}&magnet=${encodeURIComponent(magnet)}`
            });
            
            hideLoading();
            const result = await response.json();
            showToast(result.message, result.success ? 'success' : 'danger');
            if (result.success) {
                location.reload();
            }
        }

        async function copyMagnet(id) {
            showLoading();
            const response = await fetch(`/copy_magnet/${id}`);
            hideLoading();
            const result = await response.json();
            
            if (result.success) {
                copyToClipboard(result.magnet);
            } else {
                showToast('磁力链接为空，无法复制', 'danger');
            }
        }
        
        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('磁力链接已复制到剪贴板！');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('磁力链接已复制到剪贴板！');
            } catch (err) {
                showToast('复制失败，请手动复制: ' + text, 'danger');
            }
            
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
